    <!-- This is The Navigation Section -->

        <nav class="navbar">

                    <span class="bar"></span>

        </nav>
</header>

<section class="contact-page fade-in">
    <div class="contact-cta">
        <h1>Let’s connect!</h1>
        <p>For commissions and project inquiries, send a message below or email me directly.</p>
    </div>

    <div class="contact-layout">
        <aside class="contact-side">
            <p class="contact-side-label">Direct Contact</p>
            <a class="contact-side-email" href="mailto:hello@taylorcamacho.com">hello@taylorcamacho.com</a>
            <p class="contact-side-note">Toronto, Canada</p>
        </aside>

        <div class="contact-form-card">
            <h2>Send a message</h2>
            <form action="https://api.web3forms.com/submit" method="POST" id="contactForm" class="contact-form-modern">
                <input type="hidden" name="access_key" value="9239a267-365d-4e4d-b724-c74b11a16d9c">
                <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

                <div class="contact-form-grid">
                    <div class="form-field">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name" required>
                    </div>
                    <div class="form-field">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name" required>
                    </div>
                </div>

                <div class="form-field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-field">
                    <label for="message">Write a message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>

                <button type="submit" class="view-work-button contact-submit">Send Message</button>
            </form>

            <div class="contact-socials">
                <p>Or connect on socials:</p>
                <a href="https://www.linkedin.com/in/taylor-camacho-2659a51b1/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                <span>·</span>
                <a href="https://github.com/Sero113" target="_blank" rel="noopener noreferrer">Github</a>
                <span>·</span>
                <a href="https://www.instagram.com/itstaycee/?hl=en" target="_blank" rel="noopener noreferrer">IG</a>
            </div>
        </div>
    </div>
</section>
</body>

</html>
